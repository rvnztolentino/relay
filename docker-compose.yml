# Relay — local databases only. The Node API runs on the host (see .claude/setup.md).
# Postgres 18 note: the v18 image declares VOLUME /var/lib/postgresql with a
# version-specific PGDATA (/var/lib/postgresql/18/docker), so the named volume
# MUST mount at /var/lib/postgresql — NOT the old /var/lib/postgresql/data.

services:
  postgres:
    image: postgres:18-alpine
    container_name: relay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: relay-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
